services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hotel_os
      POSTGRES_PASSWORD: hotel_os
      POSTGRES_DB: hotel_os
    ports: ["5432:5432"]
    volumes: ["hotel_os_pg:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel_os"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  hotel_os_pg:
